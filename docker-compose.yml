services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: lawstate
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lawstate}
      POSTGRES_DB: lawstate
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lawstate -d lawstate"]
      interval: 5s
      timeout: 3s
      retries: 12
    restart: unless-stopped

  api:
    build: .
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --root-path /api
    environment:
      DATABASE_URL: postgresql://lawstate:${POSTGRES_PASSWORD:-lawstate}@postgres:5432/lawstate
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      HF_HOME: /root/.cache/huggingface
    volumes:
      # HF cache của host (VPS đã có BGE-M3) — không tải lại model trong container
      - ${HF_CACHE:-/root/.cache/huggingface}:/root/.cache/huggingface
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s
    restart: unless-stopped

  ui:
    build: .
    command: streamlit run ui/chat_app.py --server.port 8501 --server.address 0.0.0.0 --server.headless true
    environment:
      API_URL: http://api:8000
      BUILD_STATUS_PATH: /app/build_status.json
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8501/_stcore/health', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    restart: unless-stopped

  # F6 (additive theo CONTRACTS): admin console Streamlit sau basic-auth Caddy
  admin:
    build: .
    command: streamlit run ui/admin_app.py --server.port 8502 --server.address 0.0.0.0 --server.headless true --server.baseUrlPath /admin
    environment:
      API_URL: http://api:8000
      BUILD_STATUS_PATH: /app/build_status.json
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8502/admin/_stcore/health', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    restart: unless-stopped

  caddy:
    image: caddy:2
    # BẮT BUỘC bơm label này mỗi lần sửa deploy/Caddyfile: single-file bind mount giữ
    # inode CŨ sau `git reset --hard` trên VPS, và compose không recreate caddy nếu
    # config hash không đổi (depends_on không tính vào hash) — label đổi ⇒ recreate
    # ⇒ mount lại file mới + nạp config mới. (F6 ghi chú — bài học deploy /admin)
    labels:
      lawstate.caddyfile-rev: "f6-admin-basicauth-v2"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
      - ui
      - admin
    restart: unless-stopped

volumes:
  pgdata:
  caddy_data:
  caddy_config:
